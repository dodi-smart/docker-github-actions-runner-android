name: Check for SDK, JDK, and Node updates

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Monday at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    name: Check for updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for new JDK versions
        id: jdk
        run: |
          # Get available Temurin releases >= 17
          RESPONSE=$(curl -sf https://api.adoptium.net/v3/info/available_releases || echo "")
          if [ -z "$RESPONSE" ]; then
            echo "Failed to fetch Adoptium releases API"
            echo "has_new=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          AVAILABLE=$(echo "$RESPONSE" | jq -r '[.available_releases[] | select(. >= 17)] | sort | .[]')

          # Get current versions and find the highest
          CURRENT=$(jq -r '.java_versions[]' matrix.json)
          MAX_CURRENT=$(jq -r '.java_versions | map(tonumber) | max' matrix.json)

          # Only add versions newer than our current highest
          NEW_VERSIONS=""
          for v in $AVAILABLE; do
            if [ "$v" -gt "$MAX_CURRENT" ] && ! echo "$CURRENT" | grep -q "^${v}$"; then
              NEW_VERSIONS="${NEW_VERSIONS:+${NEW_VERSIONS} }${v}"
            fi
          done

          echo "new_versions=${NEW_VERSIONS}" >> $GITHUB_OUTPUT
          if [ -n "$NEW_VERSIONS" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "Found new JDK versions: $NEW_VERSIONS"
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No new JDK versions found"
          fi

      - name: Check for new Node LTS versions
        id: node
        run: |
          # The Node Release team's schedule.json is the authoritative source
          # for when each major enters LTS and when it goes EOL. We pick majors
          # that are currently in LTS (today is past their `lts` date and
          # before their `end` date). dist/index.json is *not* suitable here:
          # its `lts` field records that a release WAS an LTS at some point,
          # which falsely includes long-EOL majors (10, 12, 14, 16, 18).
          if ! SCHEDULE=$(curl -sf https://raw.githubusercontent.com/nodejs/Release/main/schedule.json); then
            echo "Failed to fetch Node release schedule"
            echo "has_new=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TODAY=$(date -u +%Y-%m-%d)
          AVAILABLE=$(jq -r --arg today "$TODAY" '
            to_entries
            | map(select(
                (.value.lts // null) != null and
                (.value.end // null) != null and
                .value.lts <= $today and
                .value.end > $today))
            | map(.key | ltrimstr("v") | tonumber)
            | sort | .[]
          ' <<< "$SCHEDULE")

          CURRENT=$(jq -r '.node_versions[]' matrix.json)
          MAX_CURRENT=$(jq -r '.node_versions | map(tonumber) | max' matrix.json)

          # Only add LTS majors newer than our current highest
          NEW_VERSIONS=""
          for v in $AVAILABLE; do
            if [ "$v" -gt "$MAX_CURRENT" ] && ! echo "$CURRENT" | grep -q "^${v}$"; then
              NEW_VERSIONS="${NEW_VERSIONS:+${NEW_VERSIONS} }${v}"
            fi
          done

          echo "new_versions=${NEW_VERSIONS}" >> $GITHUB_OUTPUT
          if [ -n "$NEW_VERSIONS" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "Found new Node LTS versions: $NEW_VERSIONS"
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No new Node LTS versions found"
          fi

      - name: Check for Android SDK updates
        id: sdk
        run: |
          # Determine the latest *stable* SDK versions from Google's repository
          # manifest. We deliberately do NOT use `sdkmanager --list`: it surfaces
          # preview packages as if they were stable (the preview platform
          # android-37.0 is tagged channel-0, and preview NDKs such as 30.0.14904198
          # are listed too), which then break the unattended Docker build when
          # sdkmanager demands the separate Android SDK Preview license. The manifest
          # carries reliable preview markers, so we parse it with a real XML parser
          # and skip any package that is obsolete, carries a <codename> element, or
          # uses the android-sdk-preview-license.
          if ! wget -q "https://dl.google.com/android/repository/repository2-3.xml" -O /tmp/android-repo.xml; then
            echo "Failed to download SDK repository manifest"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if ! SDK_VERSIONS=$(python3 - /tmp/android-repo.xml <<'PY'
          import re, sys, xml.etree.ElementTree as ET

          def local(tag):  # strip XML namespace, if any
              return tag.rsplit('}', 1)[-1]

          root = ET.parse(sys.argv[1]).getroot()

          def is_preview(pkg):
              if pkg.get('obsolete') == 'true':
                  return True
              for e in pkg.iter():
                  if local(e.tag) == 'codename':
                      return True
                  if local(e.tag) == 'uses-license' and e.get('ref') == 'android-sdk-preview-license':
                      return True
              return False

          def latest(version_re):
              best, best_key = '', None
              for pkg in root.iter():
                  if local(pkg.tag) != 'remotePackage' or is_preview(pkg):
                      continue
                  m = re.fullmatch(version_re, pkg.get('path', ''))
                  if not m:
                      continue
                  ver = m.group(1)
                  key = tuple(int(x) for x in ver.split('.'))
                  if best_key is None or key > best_key:
                      best, best_key = ver, key
              return best

          platform    = latest(r'platforms;android-(\d+(?:\.\d+)?)')
          build_tools = latest(r'build-tools;(\d+\.\d+\.\d+)')
          ndk         = latest(r'ndk;(\d+\.\d+\.\d+)')
          if not (platform and build_tools and ndk):
              sys.stderr.write('Failed to detect stable versions: '
                               'platform=%r build_tools=%r ndk=%r\n' % (platform, build_tools, ndk))
              sys.exit(1)
          print('LATEST_PLATFORM=%s'    % platform)
          print('LATEST_BUILD_TOOLS=%s' % build_tools)
          print('LATEST_NDK=%s'         % ndk)
          PY
          ); then
            echo "Failed to parse SDK repository manifest"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          eval "$SDK_VERSIONS"

          # Get current versions from Dockerfile
          CURRENT_PLATFORM=$(grep '^ARG COMPILE_SDK=' Dockerfile | cut -d= -f2)
          CURRENT_BUILD_TOOLS=$(grep '^ARG BUILD_TOOLS=' Dockerfile | cut -d= -f2)
          CURRENT_NDK=$(grep '^ARG NDK_VERSION=' Dockerfile | cut -d= -f2)

          echo "latest_platform=${LATEST_PLATFORM}" >> $GITHUB_OUTPUT
          echo "latest_build_tools=${LATEST_BUILD_TOOLS}" >> $GITHUB_OUTPUT
          echo "latest_ndk=${LATEST_NDK}" >> $GITHUB_OUTPUT
          echo "current_platform=${CURRENT_PLATFORM}" >> $GITHUB_OUTPUT
          echo "current_build_tools=${CURRENT_BUILD_TOOLS}" >> $GITHUB_OUTPUT
          echo "current_ndk=${CURRENT_NDK}" >> $GITHUB_OUTPUT

          # Check if updates are needed
          UPDATED=false
          # Use version-aware comparison (not integer -gt) since platform versions
          # can be MAJOR.MINOR. Update only when LATEST differs and sorts highest.
          if [ -n "$LATEST_PLATFORM" ] && [ "$LATEST_PLATFORM" != "$CURRENT_PLATFORM" ] && \
             [ "$(printf '%s\n%s\n' "$CURRENT_PLATFORM" "$LATEST_PLATFORM" | sort -V | tail -1)" = "$LATEST_PLATFORM" ]; then
            UPDATED=true
          fi
          if [ -n "$LATEST_BUILD_TOOLS" ] && [ "$LATEST_BUILD_TOOLS" != "$CURRENT_BUILD_TOOLS" ]; then
            UPDATED=true
          fi
          if [ -n "$LATEST_NDK" ] && [ "$LATEST_NDK" != "$CURRENT_NDK" ]; then
            UPDATED=true
          fi

          echo "updated=${UPDATED}" >> $GITHUB_OUTPUT
          echo "SDK check results:"
          echo "  Platform: ${CURRENT_PLATFORM} -> ${LATEST_PLATFORM}"
          echo "  Build tools: ${CURRENT_BUILD_TOOLS} -> ${LATEST_BUILD_TOOLS}"
          echo "  NDK: ${CURRENT_NDK} -> ${LATEST_NDK}"

      - name: Apply JDK updates
        if: steps.jdk.outputs.has_new == 'true'
        run: |
          for v in ${{ steps.jdk.outputs.new_versions }}; do
            jq --arg v "$v" '.java_versions += [$v] | .java_versions = (.java_versions | sort_by(tonumber))' matrix.json > tmp.json && mv tmp.json matrix.json
          done

          # Update default to highest version
          jq '.default_jdk = (.java_versions | sort_by(tonumber) | last)' matrix.json > tmp.json && mv tmp.json matrix.json

          echo "Updated matrix.json:"
          cat matrix.json

      - name: Apply Node updates
        if: steps.node.outputs.has_new == 'true'
        run: |
          for v in ${{ steps.node.outputs.new_versions }}; do
            jq --arg v "$v" '.node_versions += [$v] | .node_versions = (.node_versions | sort_by(tonumber))' matrix.json > tmp.json && mv tmp.json matrix.json
          done

          # Update default_node to highest LTS major (newest LTS line is always
          # the Active LTS once the latest major enters LTS state).
          jq '.default_node = (.node_versions | sort_by(tonumber) | last)' matrix.json > tmp.json && mv tmp.json matrix.json

          echo "Updated matrix.json:"
          cat matrix.json

      - name: Apply SDK updates
        if: steps.sdk.outputs.updated == 'true'
        run: |
          LATEST_PLATFORM="${{ steps.sdk.outputs.latest_platform }}"
          LATEST_BUILD_TOOLS="${{ steps.sdk.outputs.latest_build_tools }}"
          LATEST_NDK="${{ steps.sdk.outputs.latest_ndk }}"

          [ -n "$LATEST_PLATFORM" ] && sed -i "s/^ARG COMPILE_SDK=.*/ARG COMPILE_SDK=${LATEST_PLATFORM}/" Dockerfile
          [ -n "$LATEST_BUILD_TOOLS" ] && sed -i "s/^ARG BUILD_TOOLS=.*/ARG BUILD_TOOLS=${LATEST_BUILD_TOOLS}/" Dockerfile
          [ -n "$LATEST_NDK" ] && sed -i "s/^ARG NDK_VERSION=.*/ARG NDK_VERSION=${LATEST_NDK}/" Dockerfile

      - name: Create pull request
        if: steps.jdk.outputs.has_new == 'true' || steps.sdk.outputs.updated == 'true' || steps.node.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automated/sdk-jdk-updates"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add matrix.json Dockerfile

          # Build commit message
          MSG="Update"
          if [ "${{ steps.jdk.outputs.has_new }}" = "true" ]; then
            MSG="$MSG JDK (${{ steps.jdk.outputs.new_versions }})"
          fi
          if [ "${{ steps.node.outputs.has_new }}" = "true" ]; then
            MSG="$MSG Node (${{ steps.node.outputs.new_versions }})"
          fi
          if [ "${{ steps.sdk.outputs.updated }}" = "true" ]; then
            MSG="$MSG SDK"
          fi
          MSG="$MSG versions"
          git commit -m "$MSG"
          git push -f origin "$BRANCH"

          # Build PR body
          {
            echo "## Automated SDK/JDK/Node version updates"
            echo ""
            if [ "${{ steps.jdk.outputs.has_new }}" = "true" ]; then
              echo "### New JDK versions added to build matrix"
              for v in ${{ steps.jdk.outputs.new_versions }}; do
                echo "- JDK $v"
              done
              echo ""
            fi
            if [ "${{ steps.node.outputs.has_new }}" = "true" ]; then
              echo "### New Node LTS versions added to build matrix"
              for v in ${{ steps.node.outputs.new_versions }}; do
                echo "- Node $v"
              done
              echo ""
            fi
            if [ "${{ steps.sdk.outputs.updated }}" = "true" ]; then
              echo "### Android SDK updates"
              if [ "${{ steps.sdk.outputs.latest_platform }}" != "${{ steps.sdk.outputs.current_platform }}" ]; then
                echo "- Platform: android-${{ steps.sdk.outputs.current_platform }} -> android-${{ steps.sdk.outputs.latest_platform }}"
              fi
              if [ "${{ steps.sdk.outputs.latest_build_tools }}" != "${{ steps.sdk.outputs.current_build_tools }}" ]; then
                echo "- Build tools: ${{ steps.sdk.outputs.current_build_tools }} -> ${{ steps.sdk.outputs.latest_build_tools }}"
              fi
              if [ "${{ steps.sdk.outputs.latest_ndk }}" != "${{ steps.sdk.outputs.current_ndk }}" ]; then
                echo "- NDK: ${{ steps.sdk.outputs.current_ndk }} -> ${{ steps.sdk.outputs.latest_ndk }}"
              fi
              echo ""
            fi
            echo "This PR was generated automatically by the weekly SDK/JDK/Node update check."
          } > /tmp/pr-body.txt

          # Create PR if one doesn't already exist for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "Update SDK/JDK/Node versions" \
              --body-file /tmp/pr-body.txt \
              --head "$BRANCH"
          else
            echo "PR #${EXISTING} already exists, updated with force push"
          fi
